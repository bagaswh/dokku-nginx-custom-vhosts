location /api/v1/ {
  proxy_cache proxy_some-app_in_mem;
  proxy_pass http://some-app-5000;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Host $http_host;
  # proxy_set_header X-Region <no value>;
  proxy_set_header X-User-Tier some-app_cache_key;
  more_set_headers 'X-Region: EU';
  more_set_headers 'X-User-Tier: premium';
}


location ^~/ws/ {
  proxy_pass http://some-app-websocket_proxy;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header X-Real-IP $remote_addr;
  
}


location =/grpc/ {
  grpc_pass grpc://some-app-grpc_backend;
  grpc_set_header X-Real-IP $remote_addr;
  
}

